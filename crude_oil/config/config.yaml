# crude_oil/config/config.yaml

project:
  name: "energy_st_gnn_meta_engine"
  version: "2.0.0"
  description: "Probabilistic WTI forecasting via HMM Regimes, Convenience Yield, and Graph Logistics"

# Layer 1: The Physical Graph (Spatial-Temporal Logistics)
physical_layer:
  nodes:
    - "Permian_Basin_USA"      # Supply
    - "Ghawar_Saudi_Arabia"    # Supply
    - "Rotterdam_Netherlands"  # Demand/Refining
    - "Houston_USA"            # Demand/Refining
  edges:
    - "Suez_Canal"             # Transit Chokepoint
    - "Strait_of_Hormuz"       # Transit Chokepoint
    - "Malacca_Strait"         # Transit Chokepoint

# Layer 2: The Financial Term Structure (Contango/Backwardation)
financial_layer:
  yfinance_tickers:
    wti_front_month: "CL=F"    # Proxy for Spot Price
    brent_front_month: "BZ=F"  # Used for Brent-WTI Geopolitical Spread
  fred_series:
    usd_index: "DTWEXBGS"      # US Dollar Strength
    risk_free_rate: "DGS3MO"   # 3-Month Treasury Rate (Used for Cost of Carry math)

# Layer 3: Geopolitical Regime Switching
geopolitical_layer:
  markov_regimes: 3            # 0: Oversupply/Calm, 1: Demand Shock, 2: Supply/War Shock
  nlp_keywords:
    - "OPEC"
    - "Saudi Aramco"
    - "Strategic Petroleum Reserve"
    - "Sanctions"

# Layer 4: The Meta-Learner (Probabilistic Distribution)
meta_learner:
  prediction_horizon: 14       # 14-day horizon (standard tanker transit time from Middle East to Europe)
  context_length: 60           # 60-day historical look-back to capture regime shifts
  quantiles: [0.05, 0.5, 0.95] # 90% Confidence Interval probability matrix